onlyBuiltDependencies:
  - sharp
  - simple-git-hooks

# Dependency overrides. pnpm v10 reads overrides from this workspace file (NOT
# the package.json `pnpm`/`overrides` fields) whenever pnpm-workspace.yaml exists.
# Security entries force patched transitive versions to clear Dependabot alerts.
overrides:
  # Preserved: pin cacheable-request's transitive keyv to the v1 line (migrated
  # here from package.json, where pnpm v10 was silently ignoring it).
  'cacheable-request>keyv': 'npm:@keyvhq/core@~1.6.6'
  # --- security: transitive vuln remediation ---
  '@babel/core': '^7.29.6' # GHSA arbitrary file read via sourceMappingURL
  'dompurify': '^3.4.9' # multiple XSS / sanitizer-bypass advisories (runtime, posthog-js)
  'esbuild': '^0.28.1' # dev-server/Deno install advisories (dev toolchain)
  'flatted': '^3.4.2' # prototype pollution via parse()
  'js-yaml': '^4.2.0' # prototype pollution + quadratic DoS in merge keys
  'minimatch@<3.1.3': '^3.1.3' # ReDoS in matchOne() (scoped to vulnerable 3.x only)
  'postcss': '^8.5.10' # XSS via unescaped </style> (runtime, next)
  'tmp': '^0.2.6' # path traversal via unsanitized prefix/postfix

enablePrePostScripts: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@fisch0920/config'
  - react-notion-x
  - notion-client
  - notion-types
  - notion-utils

packageManagerStrict: false
