enablePrePostScripts: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@fisch0920/config'
  - react-notion-x
  - notion-client
  - notion-types
  - notion-utils

onlyBuiltDependencies:
  - sharp
  - simple-git-hooks
  # Migrated from package.json's `pnpm` block, which pnpm v10 ignores when this
  # workspace file exists. (Current esbuild/workerd ship prebuilt binaries via
  # optionalDependencies and have no build scripts, so this is a no-op today;
  # kept for fidelity + to allow-list them if a future version adds one.)
  - esbuild
  - workerd

# Dependency overrides. pnpm v10 reads overrides from this workspace file (NOT
# the package.json `pnpm`/`overrides` fields) whenever pnpm-workspace.yaml exists,
# so the prior top-level `overrides` block in package.json was dormant.
# Security entries force patched transitive versions to clear Dependabot alerts.
overrides:
  '@babel/core': ^7.29.6 # GHSA arbitrary file read via sourceMappingURL (dev)
  # PRESERVED: pin cacheable-request's transitive keyv to the v1 line (migrated
  # here from package.json, where pnpm v10 was silently ignoring it).
  cacheable-request>keyv: npm:@keyvhq/core@~1.6.6
  dompurify: ^3.4.11 # XSS/sanitizer-bypass + ALLOWED_ATTR pollution (RUNTIME, via posthog-js) — Dependabot
  esbuild: ^0.28.1 # dev-server/Deno install advisories (build toolchain)
  flatted: ^3.4.2 # prototype pollution via parse() (dev)
  js-yaml: ^4.2.0 # prototype pollution + quadratic DoS in merge keys (dev)
  minimatch@<3.1.3: ^3.1.3 # ReDoS in matchOne() (scoped to vulnerable 3.x only)
  postcss: ^8.5.10 # XSS via unescaped </style> (build-time CSS)
  tmp: ^0.2.6 # path traversal via unsanitized prefix/postfix (dev)
  undici: ^7.28.0 # TLS cert-validation bypass + SOCKS5 cross-origin routing (dev, via wrangler) — Dependabot HIGH
  ws@>=8.0.0 <8.21.0: '>=8.21.0' # memory-exhaustion DoS (dev, via wrangler>miniflare)
  yaml@>=2.0.0 <2.8.3: '>=2.8.3' # stack-overflow via deeply-nested collections (dev, via patch-package)

packageManagerStrict: false

# Fail-open patch for the R2 bucket-existence check in `opennextjs-cloudflare
# deploy`: since 2026-07-01 the cloudflare-node SDK's request shape gets a CF
# edge "Premature close" on GET /r2/buckets/<name> (wrangler/curl/bare fetch to
# the same endpoint succeed), which hard-failed every deploy. The check is a
# provisioning nicety — a genuinely missing bucket still fails loudly in the
# subsequent `wrangler deploy`. Drop the patch when upstream/CF fix lands.
patchedDependencies:
  '@opennextjs/cloudflare@1.19.11': patches/@opennextjs__cloudflare@1.19.11.patch
