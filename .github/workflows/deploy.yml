name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Debug Cloudflare creds (lengths + raw API test)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "token length: ${#CLOUDFLARE_API_TOKEN}"
          echo "token prefix: ${CLOUDFLARE_API_TOKEN:0:5}..."
          echo "account length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "account prefix: ${CLOUDFLARE_ACCOUNT_ID:0:8}..."
          echo "---"
          echo "Verify token:"
          curl -s -o /tmp/verify.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify
          jq '{success, errors, result}' /tmp/verify.json
          echo "---"
          echo "Get techempower-cache bucket:"
          curl -s -o /tmp/bucket.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/techempower-cache"
          jq '{success, errors, result}' /tmp/bucket.json

      - name: Build OpenNext Cloudflare bundle
        run: pnpm cf:build

      - name: Deploy to Cloudflare Workers
        run: pnpm cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
