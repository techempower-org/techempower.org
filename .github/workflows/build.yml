name: CI

on: [push]

jobs:
  test:
    name: Test Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node-version:
          - 20
          - 22
          - 24

    steps:
      - uses: actions/checkout@v7
        with:
          # No git operations run after checkout (just pnpm install + test), so
          # don't leave the auth token in .git/config for later steps to read.
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --strict-peer-dependencies
      - run: pnpm test

      # TODO Enable those lines below if you use a Redis cache, you'll also need to configure GitHub Repository Secrets
      # env:
      #   REDIS_HOST: ${{ secrets.REDIS_HOST }}
      #   REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      # - name: Build
      #   run: pnpm build
