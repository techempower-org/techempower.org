<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TechEmpower sun">
  <title>TechEmpower</title>
  <!-- Warm-earth palette to match the site (amber-600 → amber-500 gradient) -->
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
  </defs>
  <!-- 8 short rays around the disc -->
  <g stroke="#b45309" stroke-width="3.5" stroke-linecap="round">
    <line x1="32" y1="4"  x2="32" y2="11"/>
    <line x1="32" y1="53" x2="32" y2="60"/>
    <line x1="4"  y1="32" x2="11" y2="32"/>
    <line x1="53" y1="32" x2="60" y2="32"/>
    <line x1="11.7" y1="11.7" x2="16.7" y2="16.7"/>
    <line x1="47.3" y1="47.3" x2="52.3" y2="52.3"/>
    <line x1="52.3" y1="11.7" x2="47.3" y2="16.7"/>
    <line x1="16.7" y1="47.3" x2="11.7" y2="52.3"/>
  </g>
  <!-- Sun disc -->
  <circle cx="32" cy="32" r="14" fill="url(#sun)" stroke="#b45309" stroke-width="2"/>
</svg>
